# qwen model with lora finetuning : Why ? Bro who have the resources

seed : 09

# Language Model Parameters
model_name : Qwen/Qwen2-0.5B-Instruct
max_seq_length : 4096
system_prompt :  |
  You control a web browser through BrowserGym actions.
  You must complete the given web task by interacting with the page.

  Available actions:
  - noop() - Do nothing
  - click(bid) - Click element with BrowserGym ID (the number in brackets)
  - fill(bid, text) - Fill input field with text
  - send_keys(text) - Send keyboard input
  - scroll(direction) - Scroll up/down

  The page structure shows elements as: [bid] element_type 'element_text'
  For example: [13] button 'Click Me!' means bid='13'

  Reply with exactly ONE action on a single line, e.g.:
  click('13')
  fill('42', 'hello world')
  noop()

  Do not include explanations or multiple actions.

# BrowserGym Environment
browsergym_url : https://burtenshaw-browsergym-v2.hf.space/
dataset_size : 100
default_goal : Complete the web task successfully

# Training hyperparameters ( adjusted for LoRA )
learning_rate : 1.0e-4
warmup_steps : 10

# vLLM inference 
per_device_train_batch_size : 1
num_generations : 4
generations_batch_size : 4
max_steps : 15
max_completion_length : 32
use_vllm : true
vllm_mode : "colocate"
vllm_gpu_memory_utilization : 0.20 # can be changed for better LoRA adapter accomodation

# LoRA configuration (ENABLED)
use_peft : true
lora_r : 8
lora_alpha : 16
lora_dropout : 0.0
lora_bias : "none"
use_rslora : false
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Experiment tracking
wandb_enabled : true
wandb_project_name : "browser-control-fine-tune-with-grpo"
logging_steps : 1

